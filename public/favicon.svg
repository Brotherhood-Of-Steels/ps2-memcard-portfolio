<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#0d1b3e"/>
      <stop offset="100%" style="stop-color:#0a0a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="50%" style="stop-color:#2196f3"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outer-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle grid lines (PS2 vibe) -->
  <g opacity="0.06" stroke="#4fc3f7" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Corner orbs (PS2 memory card orbs) -->
  <circle cx="60" cy="60" r="18" fill="#4fc3f7" opacity="0.15"/>
  <circle cx="452" cy="60" r="14" fill="#7c4dff" opacity="0.12"/>
  <circle cx="60" cy="452" r="14" fill="#7c4dff" opacity="0.12"/>
  <circle cx="452" cy="452" r="18" fill="#4fc3f7" opacity="0.15"/>

  <!-- Outer ring accent -->
  <rect x="24" y="24" width="464" height="464" rx="76" ry="76" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.25"/>

  <!-- Letter D - outer glow layer -->
  <g filter="url(#outer-glow)" opacity="0.4">
    <text x="256" y="340" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="340" text-anchor="middle" fill="url(#glow)">D</text>
  </g>

  <!-- Letter D - main -->
  <g filter="url(#blur-glow)">
    <text x="256" y="340" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="340" text-anchor="middle" fill="url(#glow)">D</text>
  </g>

  <!-- Letter D - crisp overlay -->
  <text x="256" y="340" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="340" text-anchor="middle" fill="#e0f7fa" opacity="0.9">D</text>

  <!-- Inner highlight on D -->
  <text x="256" y="340" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="340" text-anchor="middle" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.6">D</text>

  <!-- Decorative scan line (PS2 CRT effect) -->
  <rect x="0" y="200" width="512" height="2" fill="#4fc3f7" opacity="0.04"/>
  <rect x="0" y="320" width="512" height="1" fill="#4fc3f7" opacity="0.03"/>
</svg>
