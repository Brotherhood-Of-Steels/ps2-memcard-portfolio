name: Deploy Application with Runner

on:
  push:
    branches:
      - main
      - master
      - action

jobs:
  deploy:
    # Menggunakan runner yang baru saja kamu install di VPS
    runs-on: self-hosted

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🏗️ Build and Restart Docker
        run: |
          echo "Memulai proses deploy di server..."
          
          # 1. Build image baru dari Dockerfile di repo
          docker build -t blogs-app .
          
          # 2. Hentikan container lama jika ada
          echo "Menghentikan container lama..."
          docker stop blogs-container || true
          docker rm blogs-container || true
          
          # 3. Jalankan container baru
          echo "Menjalankan container baru..."
          docker run -d \
            --name blogs-container \
            -p 5000:5000 \
            --restart unless-stopped \
            blogs-app
          
          # 4. Bersihkan image lama yang tidak terpakai (menghemat disk)
          docker image prune -f
          
          echo "🚀 Deploy Berhasil!"
          docker ps | grep blogs-container
