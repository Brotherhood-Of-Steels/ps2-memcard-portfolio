name: Deploy Application with Runner

on:
  push:
    branches:
      - main
      - master
      
jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🏗️ Build and Restart Docker
        env:
          IMAGE_NAME: ps2-portfolio
          CONTAINER_NAME: ps2-portfolio
          HOST_PORT: "8080"
          CONTAINER_PORT: "80"
        run: |
          echo "🛠️ Memulai proses build imagee..."
          
          # 1) Build dengan caching untuk kecepatan
          docker build -t ${IMAGE_NAME}:latest -t ${IMAGE_NAME}:${GITHUB_SHA} .

          echo "🛑 Membersihkan container lama..."
          # Langsung hapus tanpa perlu if-check panjang, '|| true' menjaga agar tidak error jika tidak ada container
          docker rm -f ${CONTAINER_NAME} || true

          echo "🚀 Menjalankan container baru di 127.0.0.1:${HOST_PORT}..."
          # Perhatikan penambahan 127.0.0.1 agar aman dari akses luar langsung ke IP
          docker run -d \
            --name ${CONTAINER_NAME} \
            -p ${HOST_PORT}:${CONTAINER_PORT} \
            --restart unless-stopped \
            ${IMAGE_NAME}:latest

          echo "🧹 Membersihkan image lama yang tidak terpakai..."
          docker image prune -f

          echo "✅ Konfirmasi status container:"
          docker ps | grep ${CONTAINER_NAME}